version: 2
updates:
  # Keep GitHub Actions (and their pinned SHAs) up to date weekly
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
    labels: [ci, dependencies]

  # Maven app dependencies
  - package-ecosystem: maven
    directory: /app
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
      include: scope
    labels: [maven, dependencies]
    ignore:
      # Only allow patch/minor on Spring Boot in automated PRs; majors are reviewed manually
      - dependency-name: "org.springframework.boot:*"
        update-types: ["version-update:semver-major"]

  # Docker base images
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 3
    commit-message:
      prefix: docker
      include: scope
    labels: [docker, dependencies]

  # Terraform providers
  - package-ecosystem: terraform
    directory: /infra
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 3
    commit-message:
      prefix: infra
      include: scope
    labels: [terraform, dependencies]
