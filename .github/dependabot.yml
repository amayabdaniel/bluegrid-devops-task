version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
    labels: [ci, dependencies]
    ignore:
      - dependency-name: "aquasecurity/trivy-action"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "gitleaks/gitleaks-action"
        update-types: ["version-update:semver-major"]
      - dependency-name: "anchore/sbom-action"
        update-types: ["version-update:semver-major"]
      - dependency-name: "sigstore/cosign-installer"
        update-types: ["version-update:semver-major"]
      - dependency-name: "step-security/harden-runner"
        update-types: ["version-update:semver-major"]
      - dependency-name: "slackapi/slack-github-action"
        update-types: ["version-update:semver-major"]
      - dependency-name: "hadolint/hadolint-action"
        update-types: ["version-update:semver-major"]
      - dependency-name: "mikepenz/action-junit-report"
        update-types: ["version-update:semver-major"]
      - dependency-name: "hashicorp/setup-terraform"
        update-types: ["version-update:semver-major"]
      - dependency-name: "terraform-linters/setup-tflint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "github/codeql-action"
        update-types: ["version-update:semver-major"]
      - dependency-name: "aws-actions/configure-aws-credentials"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: maven
    directory: /app
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
      include: scope
    labels: [maven, dependencies]
    ignore:
      - dependency-name: "org.springframework.boot:*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 3
    commit-message:
      prefix: docker
      include: scope
    labels: [docker, dependencies]

  - package-ecosystem: terraform
    directory: /infra
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 3
    commit-message:
      prefix: infra
      include: scope
    labels: [terraform, dependencies]
