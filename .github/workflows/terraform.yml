name: terraform

# Static analysis only. No `plan`, no `apply`, no AWS API calls.
# Rationale:
#   - Keeps CI cheap (no GH Actions minutes burned on every unrelated PR).
#   - Avoids needing any AWS credentials or OIDC role in the CI plane.
#   - Plan and apply happen LOCALLY: `make tf-plan`, `make tf-apply`.
#
# Fires only when infra/ files change on a PR (NOT on pushes to master).

on:
  pull_request:
    branches: [master, develop]
    paths:
      - 'infra/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:

concurrency:
  group: tf-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write   # for the PR comment with the summary

jobs:
  static:
    name: Terraform static analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 6
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - name: Set up Terraform 1.14.x
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.14"
          terraform_wrapper: false

      - name: terraform fmt -check
        run: terraform fmt -check -recursive -diff

      - name: terraform init (no backend)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate -no-color

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@v5
        with:
          tflint_version: latest

      - name: TFLint init + run
        run: |
          tflint --init
          tflint --recursive --format=compact

      - name: Checkov (soft-fail into SARIF)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,checkov-results.sarif
          soft_fail: false
          quiet: true

      - name: Upload Checkov SARIF
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: infra/checkov-results.sarif
          category: checkov-iac

      - name: Summarise for PR
        if: ${{ always() }}
        run: |
          {
            echo "### Terraform static analysis — \`infra/\`"
            echo ""
            echo "- fmt: ran"
            echo "- validate: ok"
            echo "- tflint: ran"
            echo "- checkov: see code-scanning alerts"
            echo ""
            echo "> No \`plan\`/\`apply\` in CI by design. Run \`make tf-plan\` locally."
          } >> "$GITHUB_STEP_SUMMARY"
