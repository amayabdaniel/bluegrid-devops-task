name: ci

on:
  push:
    branches: [master, develop]
    paths-ignore: ['evidence/**', '**/*.md', 'docs/**', 'infra/**']
  pull_request:
    branches: [master, develop]
    paths-ignore: ['evidence/**', '**/*.md', 'docs/**', 'infra/**']
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_NAME: gs-rest-service
  REGISTRY: ghcr.io

jobs:
  # slack: build started notification to #gs-rest-service-ci
  # gated by repo variable vars.SLACK_NOTIFY so the job skips silently if slack
  # isn't configured. requires secret SLACK_BOT_TOKEN and variable SLACK_CI_CHANNEL_ID.
  notify-start:
    name: slack notify start
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    if: ${{ vars.SLACK_NOTIFY == 'true' }}
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      # slack: post build-started message to the ci channel
      - uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_CI_CHANNEL_ID }}
            text: ":hammer_and_wrench: *${{ github.repository }}* build started on `${{ github.ref_name }}` (`${{ github.sha }}`) by ${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"

  hadolint:
    name: hadolint
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml
          failure-threshold: warning

  checkov-dockerfile:
    name: checkov (dockerfile)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
      - uses: bridgecrewio/checkov-action@v12
        with:
          file: Dockerfile
          framework: dockerfile
          output_format: cli,sarif
          output_file_path: console,checkov-dockerfile.sarif
          soft_fail: false
          quiet: true
      - if: ${{ always() && hashFiles('checkov-dockerfile.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-dockerfile.sarif
          category: checkov-dockerfile

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-test:
    name: build & test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
      pull-requests: write
    outputs:
      jar-name: ${{ steps.locate-jar.outputs.jar-name }}
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven
          cache-dependency-path: app/pom.xml
      - name: mvn verify
        working-directory: app
        run: ./mvnw -B -e -ntp clean verify
      - name: locate jar
        id: locate-jar
        working-directory: app
        shell: bash
        run: |
          shopt -s nullglob
          jar=""
          for f in target/gs-rest-service-*.jar; do
            case "$f" in *.original) continue ;; esac
            jar="$f"
            break
          done
          if [ -z "$jar" ] || [ ! -f "$jar" ]; then
            echo "::error::JAR not found under app/target"
            exit 1
          fi
          echo "jar-name=$(basename "$jar")" >> "$GITHUB_OUTPUT"
      - name: junit report
        id: junit
        if: ${{ always() }}
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386 # v6.4.0
        with:
          report_paths: 'app/target/surefire-reports/TEST-*.xml'
          require_tests: true
          detailed_summary: true
          include_passed: true
          check_name: junit
      - uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: app/target/gs-rest-service-*.jar
          if-no-files-found: error
          retention-days: 7
      - if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: app/target/surefire-reports/
          if-no-files-found: warn
          retention-days: 7

      # slack: tests-completed notification with pass/fail summary
      # posts after mvn verify finishes, regardless of pass/fail, if slack is enabled
      - name: slack notify tests completed
        if: ${{ always() && vars.SLACK_NOTIFY == 'true' }}
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_CI_CHANNEL_ID }}
            text: ":test_tube: *${{ github.repository }}* tests ${{ steps.junit.outcome }} on `${{ github.ref_name }}` (`${{ github.sha }}`)\n- passed: ${{ steps.junit.outputs.passed || 0 }}\n- failed: ${{ steps.junit.outputs.failed || 0 }}\n- skipped: ${{ steps.junit.outputs.skipped || 0 }}\n- total:   ${{ steps.junit.outputs.total || 0 }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|full results>"

  build-image:
    name: build, scan & publish image
    needs: [build-test, hadolint, checkov-dockerfile]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: tags
        id: tags
        run: |
          short_sha="${GITHUB_SHA::7}"
          ref="${GITHUB_REF_NAME//\//-}"
          full="${REGISTRY}/${{ github.repository_owner }}/${IMAGE_NAME}"
          full_lc="${full,,}"
          {
            echo "image=${full_lc}"
            echo "tag_sha=${full_lc}:${ref}-${short_sha}"
            echo "tag_branch=${full_lc}:${ref}"
          } >> "$GITHUB_OUTPUT"
      - name: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: ${{ steps.tags.outputs.tag_sha }}
          build-args: |
            APP_VERSION=0.1.0
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
      - name: trivy critical gate
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.tags.outputs.tag_sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true
          vuln-type: 'os,library'
      - name: ghcr login
        if: ${{ github.event_name == 'push' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: push
        if: ${{ github.event_name == 'push' }}
        run: |
          docker tag "${{ steps.tags.outputs.tag_sha }}" "${{ steps.tags.outputs.tag_branch }}"
          docker push "${{ steps.tags.outputs.tag_sha }}"
          docker push "${{ steps.tags.outputs.tag_branch }}"
      - name: sbom
        if: ${{ github.event_name == 'push' }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.tags.outputs.tag_sha }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true
          upload-release-assets: false
      - name: install cosign
        if: ${{ github.event_name == 'push' }}
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
      - name: sign + attest sbom
        if: ${{ github.event_name == 'push' }}
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          digest="$(docker inspect --format='{{index .RepoDigests 0}}' "${{ steps.tags.outputs.tag_sha }}")"
          cosign sign --yes "$digest"
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson "$digest"

  # slack: build finished consolidated notification to #gs-rest-service-ci
  # runs after every required job, regardless of pass/fail (always()).
  # status is computed from the individual job results so the slack message
  # mirrors what the actions page shows.
  notify-end:
    name: slack notify end
    needs: [build-test, build-image, hadolint, gitleaks, checkov-dockerfile]
    if: ${{ always() && vars.SLACK_NOTIFY == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      # slack: compute pass/fail verdict from the needs results
      - id: status
        run: |
          fail=0
          for s in '${{ needs.build-test.result }}' '${{ needs.build-image.result }}' '${{ needs.hadolint.result }}' '${{ needs.gitleaks.result }}' '${{ needs.checkov-dockerfile.result }}'; do
            case "$s" in
              success|skipped) ;;
              *) fail=1 ;;
            esac
          done
          if [ "$fail" -eq 0 ]; then
            echo "icon=:white_check_mark:" >> "$GITHUB_OUTPUT"
            echo "verdict=passed" >> "$GITHUB_OUTPUT"
          else
            echo "icon=:x:" >> "$GITHUB_OUTPUT"
            echo "verdict=failed" >> "$GITHUB_OUTPUT"
          fi
      # slack: post the consolidated build-finished message
      - uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_CI_CHANNEL_ID }}
            text: "${{ steps.status.outputs.icon }} *${{ github.repository }}* build *${{ steps.status.outputs.verdict }}* on `${{ github.ref_name }}` (`${{ github.sha }}`)\n- build-test: `${{ needs.build-test.result }}`\n- build-image: `${{ needs.build-image.result }}`\n- hadolint: `${{ needs.hadolint.result }}`\n- gitleaks: `${{ needs.gitleaks.result }}`\n- checkov-dockerfile: `${{ needs.checkov-dockerfile.result }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|run> <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|commit>"
