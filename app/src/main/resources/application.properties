# Server
server.port=${SERVER_PORT:8080}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=15s

# Banner off in container logs
spring.main.banner-mode=off

# Actuator: expose only health, on a separate port so it is never reachable from
# the public internet (mapped only on localhost in Docker run).
management.server.port=8081
management.server.address=127.0.0.1
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

# Tighten error responses (don't leak stacktraces to clients)
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
